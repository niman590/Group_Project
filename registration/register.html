<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Civic Plan - Registration</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="register-container">

      <!-- LEFT SIDE -->
      <div class="left-panel">
        <div class="overlay"></div>
        <div class="left-content">
          <h1>
            Smart Digital Land
            Management and
            Planning Approval
            System
          </h1>
          <p>
            Secure citizen registration portal for accessing land
            records, planning approvals, and related digital services
          </p>
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right-panel">

        <!-- ✅ FIXED LOGO PATH -->
        <div class="top-logo">
          <img src="../images/logo_01.jpg" alt="Logo">
        </div>

        <h2 class="brand-title">CIVIC PLAN</h2>
        <p class="brand-subtitle">Land Management Portal</p>

        <p class="section-title">Registration</p>

        <form class="register-form">

          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text">
            </div>

            <div class="form-group">
              <label>NIC Number</label>
              <input type="text">
            </div>
          </div>

          <div class="form-group full-width">
            <label>Residential Address</label>
            <textarea></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email">
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="text">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Password</label>
              <input type="password">
            </div>

            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password">
            </div>
          </div>

          <div class="remember-row">
            <label class="remember-me">
              <input type="checkbox">
              <span>Remember me</span>
            </label>
          </div>

          <button class="register-btn">Register</button>

          <!-- ✅ FIXED LINK -->
          <p class="login-text">
            Already have an account? <a href="../login/index.html">Login here</a>
          </p>

          <!-- ✅ FIXED BACK BUTTON -->
          <a href="../login/index.html" class="back-btn">Back</a>

        </form>
      </div>

    </div>
  </div>

</body>
</html>
