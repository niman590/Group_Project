<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic Plan - Login</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="main-wrapper">
    <div class="login-container">
      <!-- Left Panel -->
      <div class="left-panel">
        <div class="overlay"></div>
        <div class="left-content">
          <h1>
            Smart Digital Land
            Management and
            Planning Approval
            System
          </h1>
          <p>
            Secure access portal for citizens and administrators to manage land records,
            planning approvals, and related digital services.
          </p>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="right-panel">
        <div class="top-logo">
          <img src="../images/logo_01.jpg" alt="Logo" />
        </div>

        <h2 class="brand-title">CIVIC PLAN</h2>
        <p class="brand-subtitle">Land Management Portal</p>

        <form class="login-form">
          <label for="username">NIC / Username</label>
          <input type="text" id="username" name="username" />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" />

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit">Login</button>
        </form>

        <p class="register-text">
          Don’t have an account?
          <a href="../registration/register.html">Register here</a>
        </p>
      </div>
    </div>
  </div>
</body>

</html>
