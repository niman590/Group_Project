<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Plan - GIS Mapping</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='user_sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='gis_mapping.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>
    <div class="dashboard-shell">

        {% include 'partials/user_sidebar.html' %}

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>GIS Mapping</h1>
                    <p>Select your land location directly on the map.</p>
                </div>
            </header>

            <section class="gis-card">
                <div class="gis-header">
                    <h2>Select Land Location</h2>
                    <p>Click on the map to choose the exact location of your land.</p>
                </div>

                <form method="POST" action="{{ url_for('gis.save_gis_location') }}" class="gis-form">
                    <div id="map"></div>

                    <div class="location-grid">
                        <div class="form-group">
                            <label for="latitude">Latitude</label>
                            <input type="text" id="latitude" name="latitude" readonly required>
                        </div>

                        <div class="form-group">
                            <label for="longitude">Longitude</label>
                            <input type="text" id="longitude" name="longitude" readonly required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Selected Address</label>
                        <textarea id="address" name="address" rows="3" readonly placeholder="Selected address will appear here"></textarea>
                    </div>

                    <div class="map-actions">
                        <button type="button" class="secondary-btn" id="useCurrentLocation">
                            <i class="fa-solid fa-location-crosshairs"></i> Use My Current Location
                        </button>

                        <button type="submit" class="primary-btn">
                            <i class="fa-solid fa-floppy-disk"></i> Save Location
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const defaultLat = 6.9271;
        const defaultLng = 79.8612;

        const map = L.map("map").setView([defaultLat, defaultLng], 13);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        let marker = null;

        const latitudeInput = document.getElementById("latitude");
        const longitudeInput = document.getElementById("longitude");
        const addressInput = document.getElementById("address");
        const currentLocationBtn = document.getElementById("useCurrentLocation");

        function setMarker(lat, lng) {
            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 16);

            latitudeInput.value = lat.toFixed(6);
            longitudeInput.value = lng.toFixed(6);

            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                .then(response => response.json())
                .then(data => {
                    addressInput.value = data.display_name || "Address not found";
                })
                .catch(() => {
                    addressInput.value = "Unable to fetch address";
                });
        }

        map.on("click", function (e) {
            setMarker(e.latlng.lat, e.latlng.lng);
        });

        currentLocationBtn.addEventListener("click", function () {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    setMarker(position.coords.latitude, position.coords.longitude);
                },
                function () {
                    alert("Unable to retrieve your current location.");
                }
            );
        });
    </script>
</body>
</html>
