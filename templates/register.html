<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic Plan - Registration</title>
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>

<body>
  <div class="register-page">
    <!-- LEFT SIDE -->
    <div class="left-side">
      <div class="overlay"></div>

      <div class="left-content">
        <h1>
          Smart Digital
          Land
          Management
          and Planning
          Approval System
        </h1>

        <p>
          Secure citizen registration portal for accessing land records,
          planning approvals, and related digital services.
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
      <div class="form-container">
        <div class="logo-box">
          <img src="{{ url_for('static', filename='images/logo_2-removebackground.png') }}" alt="Civic Plan Logo">
        </div>

        <h2 class="brand-title">CIVIC PLAN</h2>
        <p class="brand-subtitle">Land Management Portal</p>

        <p class="section-title">Registration</p>

        <form class="register-form">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" name="firstName" />
            </div>

            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" name="lastName" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="nic">NIC Number</label>
              <input type="text" id="nic" name="nic" />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="text" id="phone" name="phone" />
            </div>
          </div>

          <div class="form-group full-width">
            <label for="address">Residential Address</label>
            <textarea id="address" name="address"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" />
            </div>
          </div>

          <div class="remember-row">
            <label class="remember-me">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
          </div>

          <button type="submit" class="register-btn">Register</button>

          <p class="login-text">
            Already have an account?
            <a href="{{ url_for('login') }}">Login here</a>
          </p>

          <a href="{{ url_for('login') }}" class="back-btn">Back</a>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
