<!DOCTYPE html>
<html>
<head>
    <title>Land Value Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Land Value Prediction</h2>

    <input id="publication_year" type="number" placeholder="Publication Year"><br>
    <input id="land_size" type="number" min="6" step="0.1" placeholder="Land Size (minimum 6 perches)"><br>
    <input id="access_road_size" type="number" placeholder="Access Road Size"><br>
    <input id="distance_to_city" type="number" step="0.1" placeholder="Distance to City"><br>

    <select id="location">
        <option value="Ragama">Ragama</option>
        <option value="Rajagiriya">Rajagiriya</option>
        <option value="Malabe">Malabe</option>
        <option value="Ja-Ela">Ja-Ela</option>
        <option value="Kelaniya">Kelaniya</option>
        <option value="Kadana">Kadana</option>
        <option value="Kadawatha">Kadawatha</option>
        <option value="Kaduwela">Kaduwela</option>
    </select><br>

    <select id="zone_type">
        <option value="Residential">Residential</option>
        <option value="Commercial">Commercial</option>
        <option value="Agricultural">Agricultural</option>
    </select><br>

    <input id="electricity" type="number" min="0" max="1" placeholder="Electricity (1 or 0)"><br>
    <input id="water" type="number" min="0" max="1" placeholder="Water (1 or 0)"><br>
    <input id="flood_risk" type="number" min="0" max="1" placeholder="Flood Risk (1 or 0)"><br>

    <button onclick="predictLandValue()">Predict</button>

    <p id="message"></p>

    <h3>Results</h3>
    <p>Current Value: <span id="current_value">-</span></p>
    <p>Predicted 1 Year: <span id="predicted_1_year">-</span></p>
    <p>Predicted 5 Year: <span id="predicted_5_year">-</span></p>

    <script>
        async function predictLandValue() {
            const message = document.getElementById("message");
            const currentValue = document.getElementById("current_value");
            const predicted1Year = document.getElementById("predicted_1_year");
            const predicted5Year = document.getElementById("predicted_5_year");

            message.innerText = "";
            message.className = "";
            currentValue.innerText = "-";
            predicted1Year.innerText = "-";
            predicted5Year.innerText = "-";

            const landSize = parseFloat(document.getElementById("land_size").value);

            if (isNaN(landSize)) {
                message.innerText = "Please enter land size.";
                message.className = "error";
                return;
            }

            if (landSize < 6) {
                message.innerText = "Land size must be 6 perches or more.";
                message.className = "error";
                return;
            }

            const payload = {
                publication_year: parseInt(document.getElementById("publication_year").value),
                land_size: landSize,
                access_road_size: parseInt(document.getElementById("access_road_size").value),
                location: document.getElementById("location").value,
                distance_to_city: parseFloat(document.getElementById("distance_to_city").value),
                zone_type: document.getElementById("zone_type").value,
                electricity: parseInt(document.getElementById("electricity").value),
                water: parseInt(document.getElementById("water").value),
                flood_risk: parseInt(document.getElementById("flood_risk").value)
            };

            try {
                const response = await fetch("/predict-land-value", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.error) {
                    message.innerText = result.error;
                    message.className = "error";
                    return;
                }

                message.innerText = "Land valuation estimated successfully.";
                message.className = "success";

                currentValue.innerText = result.current_value;
                predicted1Year.innerText = result.predicted_1_year;
                predicted5Year.innerText = result.predicted_5_year;
            } catch (error) {
                message.innerText = "Something went wrong while predicting land value.";
                message.className = "error";
            }
        }
    </script>
</body>
</html>
