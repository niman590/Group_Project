<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic Plan - Password Reset</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='password_reset.css') }}">
</head>

<body>

  <div class="reset-page">

    <!-- LEFT SIDE -->
    <div class="left-side">
      <div class="overlay"></div>
      <div class="left-content">
        <h1>
          Secure Password
          Recovery for
          Your Account
        </h1>
        <p>
          Verify your identity using your recovery email and OTP,
          then create a new password securely.
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
      <div class="form-container">

        <div class="logo-box">
          <img src="{{ url_for('static', filename='images/logo_2-removebackground.png') }}" alt="Logo">
        </div>

        <h2 class="brand-title">CIVIC PLAN</h2>
        <p class="brand-subtitle">Land Management Portal</p>

        <p class="section-title">Password Reset</p>

        <!-- WEBSITE MESSAGE BOX -->
        <div id="form-message" class="form-message" style="display: none;"></div>

        <form class="reset-form">

          <!-- EMAIL + SEND OTP -->
          <div class="form-group">
            <label>Recovery Email</label>
            <div class="inline-group">
              <input type="email" name="email" placeholder="Enter your recovery email" required>
              <button type="button" class="otp-btn">Send OTP</button>
            </div>
          </div>

          <!-- OTP + VERIFY -->
          <div class="form-group">
            <label>Enter OTP</label>
            <div class="inline-group">
              <input type="text" name="otp" placeholder="Enter OTP" required>
              <button type="button" class="verify-btn">Verify OTP</button>
            </div>
          </div>

          <!-- NEW PASSWORD -->
          <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="Enter new password" required>
          </div>

          <!-- CONFIRM PASSWORD -->
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
          </div>

          <button type="submit" class="reset-btn">Reset Password</button>

          <p class="login-text">
            <a href="{{ url_for('auth.login') }}">Back to Login</a>
          </p>

        </form>

      </div>
    </div>

  </div>

  <script>
    const emailInput = document.querySelector('input[name="email"]');
    const otpInput = document.querySelector('input[name="otp"]');
    const newPasswordInput = document.querySelector('input[name="new_password"]');
    const confirmPasswordInput = document.querySelector('input[name="confirm_password"]');

    const sendBtn = document.querySelector(".otp-btn");
    const verifyBtn = document.querySelector(".verify-btn");
    const form = document.querySelector(".reset-form");
    const formMessage = document.getElementById("form-message");

    function showMessage(message, type = "error") {
      formMessage.textContent = message;
      formMessage.className = `form-message ${type}`;
      formMessage.style.display = "block";
    }

    function clearMessage() {
      formMessage.textContent = "";
      formMessage.className = "form-message";
      formMessage.style.display = "none";
    }

    // SEND OTP
    sendBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      clearMessage();

      if (!email) {
        showMessage("Please enter your email", "error");
        return;
      }

      try {
        const res = await fetch("/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
          showMessage("OTP sent to your email", "success");
        } else {
          showMessage(data.message || "Error sending OTP", "error");
        }
      } catch (error) {
        showMessage("Something went wrong while sending OTP", "error");
      }
    });

    // VERIFY OTP
    verifyBtn.addEventListener("click", async () => {
      const otp = otpInput.value.trim();
      clearMessage();

      if (!otp) {
        showMessage("Please enter OTP", "error");
        return;
      }

      try {
        const res = await fetch("/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ otp })
        });

        const data = await res.json();

        if (data.success) {
          showMessage("OTP verified successfully", "success");
        } else {
          showMessage(data.message || "Invalid OTP", "error");
        }
      } catch (error) {
        showMessage("Something went wrong while verifying OTP", "error");
      }
    });

    // RESET PASSWORD
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();

      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (!newPassword || !confirmPassword) {
        showMessage("Please fill all fields", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match", "error");
        return;
      }

      try {
        const res = await fetch("/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ new_password: newPassword })
        });

        const data = await res.json();

        if (data.success) {
          showMessage("Password reset successful!", "success");
          setTimeout(() => {
            window.location.href = "/login";
          }, 1200);
        } else {
          showMessage(data.message || "Error resetting password", "error");
        }
      } catch (error) {
        showMessage("Something went wrong while resetting password", "error");
      }
    });
  </script>

</body>

</html>
