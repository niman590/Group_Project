<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civic Plan - Password Reset</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='password_reset.css') }}">
</head>
<body>
  <div class="reset-page">
    <div class="left-side">
      <div class="overlay"></div>

      <div class="left-content">
        <h1>
          Secure Password
          Recovery for
          Your Account
        </h1>

        <p>
          Verify your identity using your recovery email and OTP, then create a new password securely.
        </p>
      </div>
    </div>

    <div class="right-side">
      <div class="form-container">
        <div class="logo-box">
          <img src="{{ url_for('static', filename='images/logo_2-removebackground.png') }}" alt="Civic Plan Logo">
        </div>

        <h2 class="brand-title">CIVIC PLAN</h2>
        <p class="brand-subtitle">Land Management Portal</p>

        <p class="section-title">Password Reset</p>

        <form class="reset-form" method="POST" action="{{ url_for('password_reset_post') }}">
          <div class="form-group">
            <label for="email">Recovery Email</label>
            <div class="inline-group">
              <input type="email" id="email" name="email" placeholder="Enter your recovery email" required />
              <button type="button" class="otp-btn">Send OTP</button>
            </div>
          </div>

          <div class="form-group">
            <label for="otp">Enter OTP</label>
            <input type="text" id="otp" name="otp" placeholder="Enter OTP" required />
          </div>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="new_password" placeholder="Enter new password" required />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm new password" required />
          </div>

          <button type="submit" class="reset-btn">Reset Password</button>

          <p class="login-text">
            <a href="{{ url_for('login') }}">Back to Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
