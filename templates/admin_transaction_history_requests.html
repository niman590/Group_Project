<td>
    {% if req['status'] == 'Pending' %}
    <div class="action-stack">
        <form action="{{ url_for('admin.approve_transaction_history_request', request_id=req['request_id']) }}"
            method="POST">
            <button type="submit" class="btn-approve">
                <i class="fa-solid fa-check"></i> Approve
            </button>
        </form>

        <form action="{{ url_for('admin.reject_transaction_history_request', request_id=req['request_id']) }}"
            method="POST" class="reject-form">
            <input type="text" name="admin_comment" placeholder="Reason for rejection" required>
            <button type="submit" class="btn-reject">
                <i class="fa-solid fa-xmark"></i> Reject
            </button>
        </form>
    </div>

    {% elif req['status'] == 'Approved' %}
    <div class="action-stack">
        <form action="{{ url_for('transaction_history.delete_approved_transaction', request_id=req['request_id']) }}"
            method="POST" onsubmit="return confirm('Are you sure you want to delete this approved transaction?');">
            <button type="submit" class="btn-delete">
                <i class="fa-solid fa-trash"></i> Delete
            </button>
        </form>
    </div>

    {% else %}
    <span class="processed-label">Processed</span>
    {% endif %}
</td>
